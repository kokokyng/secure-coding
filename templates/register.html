{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<h2>회원가입</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  사용자명 (영문/숫자/밑줄, 3~20자): <input type="text" name="username" pattern="[A-Za-z0-9_]{3,20}" required><br>
  비밀번호 (8자 이상): <input type="password" name="password" minlength="8" required><br>
  <button type="submit">회원가입</button>
</form>
{% endblock %}
