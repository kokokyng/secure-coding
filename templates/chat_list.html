{% extends "base.html" %}
{% block title %}1:1 채팅{% endblock %}
{% block content %}
<h2>1:1 채팅 상대 선택</h2>
<ul>
  {% for u in users %}
    <li><a href="{{ url_for('chat_room', username=u.username) }}">{{ u.username }}</a></li>
  {% else %}
    <li>채팅할 수 있는 사용자가 없습니다.</li>
  {% endfor %}
</ul>
{% endblock %}
