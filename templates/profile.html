{% extends "base.html" %}
{% block title %}프로필{% endblock %}
{% block content %}
<h2>프로필 관리</h2>
<p>사용자명: {{ user.username }}</p>
<p>잔액: {{ user.balance }}원</p>

<h3>소개글 수정</h3>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="action" value="update_bio">
  소개글: <br>
  <textarea name="bio" rows="4" cols="50" maxlength="500">{{ user.bio or '' }}</textarea><br>
  <button type="submit">프로필 업데이트</button>
</form>

<h3>비밀번호 변경</h3>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="action" value="change_password">
  현재 비밀번호: <input type="password" name="current_password" required><br>
  새 비밀번호 (8자 이상): <input type="password" name="new_password" minlength="8" required><br>
  새 비밀번호 확인: <input type="password" name="confirm_password" minlength="8" required><br>
  <button type="submit">비밀번호 변경</button>
</form>
{% endblock %}
